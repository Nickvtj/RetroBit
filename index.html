<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroBit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Covered+By+Your+Grace&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="win splash__win">
      <div class="win__bar"><span>RetroBit</span></div>
      <div class="splash__body">
        <h1 class="splash__title">RetroBit</h1>
        <p class="splash__sub">uma ferramenta de desenho com traço tremido</p>
        <button type="button" class="splash__go" id="btn-start">Vamos desenhar!</button>
        <span class="splash__ver">v1.0</span>
      </div>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <header class="menubar">
      <div class="menubar__brand">RetroBit</div>
      <nav class="menubar__items">
        <button type="button" class="menubar__link">Arquivo</button>
        <button type="button" class="menubar__link">Edição</button>
        <div class="menubar__drop-wrap">
          <button type="button" class="menubar__link" data-menu-trigger="view">Exibir</button>
          <div class="menubar__drop" id="menu-view" hidden>
            <button type="button" id="menu-theme-toggle">modo escuro</button>
          </div>
        </div>
      </nav>
      <div class="menubar__dither" aria-hidden="true"></div>
    </header>

    <div class="stage">
      <section class="canvas-zone">
        <div class="canvas-frame">
          <canvas id="main-canvas" aria-label="Área de desenho"></canvas>
          <canvas id="overlay-canvas" aria-hidden="true"></canvas>
        </div>
      </section>

      <aside class="tool-rail">
        <nav class="tool-rail__stack" id="tool-list"></nav>

        <label class="color-pick" title="Escolher cor">
          <span class="color-pick__frame">
            <span class="color-pick__chip" id="color-tip"></span>
            <span class="color-pick__label">cor</span>
          </span>
          <input type="color" id="color-input" value="#000000">
        </label>
      </aside>
    </div>

    <footer class="dock">
      <button type="button" class="scribble scribble--export" id="btn-export" title="exportar">EXPORT</button>

      <div class="dock__group">
        <span class="dock__note">opções</span>
        <div class="dock__group-row">
          <button type="button" class="scribble" id="btn-crop" title="recortar">CROP</button>
          <button type="button" class="scribble" id="btn-undo" title="desfazer">OOPS!</button>
          <button type="button" class="scribble scribble--sm" id="btn-redo" title="refazer">REDO</button>
        </div>
      </div>

      <div class="dock__size-wrap">
        <span class="dock__note">tamanho do traço</span>
        <div class="dock__size">
          <button type="button" class="dock__size-btn" id="btn-size-down" aria-label="Diminuir">&#9664;</button>
          <span class="dock__size-stage"><span class="dock__size-dot" id="size-preview"></span></span>
          <button type="button" class="dock__size-btn" id="btn-size-up" aria-label="Aumentar">&#9654;</button>
        </div>
      </div>

      <button type="button" class="scribble scribble--obliterate" id="btn-clear" title="limpar tudo">OBLITERAR!</button>
    </footer>
  </div>

  <div class="modal-backdrop" id="crop-modal" hidden>
    <div class="win modal">
      <div class="win__bar"><span>recortar</span></div>
      <div class="modal__body">
        <p>pré-visualização:</p>
        <canvas id="crop-preview"></canvas>
        <div class="modal__acts">
          <button type="button" id="btn-crop-cancel">cancelar</button>
          <button type="button" id="btn-crop-apply">aplicar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
