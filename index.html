<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroBit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Covered+By+Your+Grace&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Splash ─────────────────────────────────────────── -->
  <div id="splash" class="splash">
    <div class="win splash__win">
      <div class="win__bar"><span>RetroBit</span></div>
      <div class="splash__body">
        <h1 class="splash__title">RetroBit</h1>
        <p class="splash__sub">uma ferramenta de desenho com traço tremido</p>
        <button type="button" class="splash__go" id="btn-start">Vamos desenhar!</button>
        <span class="splash__ver">v1.0</span>
      </div>
    </div>
  </div>

  <!-- ── Galeria de projetos ────────────────────────────── -->
  <div id="gallery" class="gallery" hidden>
    <header class="gallery__bar"><span>• RetroBit •</span></header>
    <div class="gallery__grid" id="gallery-grid"></div>
  </div>

  <!-- ── Tela de desenho ────────────────────────────────── -->
  <div id="app" class="app" hidden>
    <button type="button" class="back-btn" id="btn-back">◀ voltar</button>

    <section class="canvas-zone">
      <div class="canvas-frame" id="canvas-frame">
        <canvas id="main-canvas" aria-label="Área de desenho"></canvas>
        <canvas id="overlay-canvas" aria-hidden="true"></canvas>
      </div>
    </section>

    <aside class="tool-rail">
      <nav class="tool-rail__stack" id="tool-list"></nav>
      <button type="button" class="obliterate" id="btn-clear" title="obliterar tudo"></button>
    </aside>

    <footer class="dock">
      <button type="button" class="paper-btn" id="btn-save">Salvar</button>
      <button type="button" class="paper-btn" id="btn-export-gif">Exportar</button>
      <button type="button" class="paper-btn" id="btn-background">Background</button>
      <button type="button" class="paper-btn" id="btn-crop">Crop</button>
      <button type="button" class="paper-btn paper-btn--icon" id="btn-undo" title="desfazer (Ctrl+Z)">↶</button>
      <button type="button" class="paper-btn paper-btn--icon" id="btn-redo" title="refazer (Ctrl+Y)">↷</button>
      <div class="dock__size">
        <span class="dock__size-label">tamanho</span>
        <div class="stepper">
          <button type="button" class="stepper__btn" id="dock-size-down" aria-label="Diminuir">&#8249;</button>
          <span class="stepper__stage"><span class="stepper__dot" id="dock-size-dot"></span></span>
          <button type="button" class="stepper__btn" id="dock-size-up" aria-label="Aumentar">&#8250;</button>
        </div>
      </div>
      <button type="button" class="paper-btn paper-btn--icon dock__mute" id="btn-mute" title="som">♪</button>
    </footer>
  </div>

  <!-- ── Modal: cor + opacidade da ferramenta ───────────── -->
  <div class="modal-backdrop" id="color-modal" hidden>
    <div class="win color-win">
      <div class="win__bar">
        <span id="color-win-title">escolher cor</span>
        <button type="button" class="win__close" id="color-close" aria-label="Fechar">×</button>
      </div>
      <div class="color-win__body">
        <div class="color-grid" id="color-grid"></div>
        <div class="color-win__ctrls">
          <div class="ctrl-row">
            <span class="ctrl-row__label">opacidade</span>
            <div class="stepper">
              <button type="button" class="stepper__btn" id="modal-op-down" aria-label="Menos">&#9664;</button>
              <span class="stepper__stage"><span class="stepper__val" id="modal-op-val">100%</span></span>
              <button type="button" class="stepper__btn" id="modal-op-up" aria-label="Mais">&#9654;</button>
            </div>
          </div>
        </div>
        <div class="color-win__foot">
          <span class="color-win__chip" id="color-current"></span>
          <input type="text" class="color-win__hex" id="color-hex" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: cor do fundo ────────────────────────────── -->
  <div class="modal-backdrop" id="bg-modal" hidden>
    <div class="win color-win">
      <div class="win__bar">
        <span>cor do fundo</span>
        <button type="button" class="win__close" id="bg-close" aria-label="Fechar">×</button>
      </div>
      <div class="color-win__body">
        <div class="color-grid" id="bg-grid"></div>
        <div class="color-win__foot">
          <span class="color-win__chip" id="bg-current"></span>
          <input type="text" class="color-win__hex" id="bg-hex" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: tamanho da tela (Crop) ──────────────────── -->
  <div class="modal-backdrop" id="res-modal" hidden>
    <div class="win res-win">
      <div class="win__bar">
        <span>tamanho da tela</span>
        <button type="button" class="win__close" id="res-close" aria-label="Fechar">×</button>
      </div>
      <div class="res-win__body" id="res-list"></div>
    </div>
  </div>

  <!-- Transição íris pixelada (canvas de baixa resolução ampliado) -->
  <canvas id="wipe" class="wipe" hidden></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>
