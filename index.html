<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroBit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Covered+By+Your+Grace&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Filtro SVG: tremor 8-bit reutilizável (título da splash, etc.) -->
  <svg width="0" height="0" class="rb-defs" aria-hidden="true" focusable="false">
    <defs>
      <filter id="rb-wiggle" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.02" numOctaves="2" seed="3" result="n">
          <animate attributeName="seed" values="1;3;5;7;9;11" dur="0.55s" calcMode="discrete" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- ── Splash ─────────────────────────────────────────── -->
  <div id="splash" class="splash">
    <div class="splash__body">
      <h1 class="splash__title">RetroBit</h1>
      <p class="splash__sub">uma ferramenta de desenho com traço tremido</p>
      <button type="button" class="splash__go" id="btn-start">Vamos desenhar!</button>
    </div>
    <span class="splash__ver">v1.3</span>
    <p class="splash__credit">desenvolvido por Nicolas Vieira</p>
  </div>

  <!-- ── Galeria de projetos ────────────────────────────── -->
  <div id="gallery" class="gallery" hidden>
    <header class="gallery__bar"><span>• RetroBit •</span></header>
    <div class="gallery__grid" id="gallery-grid"></div>
  </div>

  <!-- ── Tela de desenho ────────────────────────────────── -->
  <div id="app" class="app" hidden>
    <button type="button" class="back-btn" id="btn-back">◀ voltar</button>

    <aside class="layers-panel" id="layers-panel" aria-label="Camadas">
      <header class="layers-panel__bar"><span>camadas</span></header>
      <div class="layers-panel__list" id="layers-list"></div>
      <button type="button" class="layers-panel__add" id="layers-add" title="nova camada">+</button>
    </aside>

    <section class="canvas-zone">
      <div class="canvas-stack">
        <div class="mirror-bar" role="toolbar" aria-label="Ferramentas do quadro">
          <button type="button" class="mirror-btn" id="btn-mirror-h" title="espelho horizontal" aria-pressed="false">
            <svg class="mirror-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect class="mirror-btn__ink" x="13" y="3" width="4" height="18"/>
              <rect class="mirror-btn__ink" x="4" y="9" width="6" height="6"/>
            </svg>
          </button>
          <button type="button" class="mirror-btn" id="btn-mirror-v" title="espelho vertical" aria-pressed="false">
            <svg class="mirror-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect class="mirror-btn__ink" x="3" y="13" width="18" height="4"/>
              <rect class="mirror-btn__ink" x="9" y="4" width="6" height="6"/>
            </svg>
          </button>
          <span class="mirror-bar__sep" aria-hidden="true"></span>
          <button type="button" class="mirror-btn" id="btn-shape-rect" data-shape="rect" title="retângulo" aria-pressed="false">
            <svg class="mirror-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="6" width="14" height="12" fill="none" stroke="currentColor" stroke-width="3"/>
            </svg>
          </button>
          <button type="button" class="mirror-btn" id="btn-shape-ellipse" data-shape="ellipse" title="elipse" aria-pressed="false">
            <svg class="mirror-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="12" rx="9" ry="7" fill="none" stroke="currentColor" stroke-width="3"/>
            </svg>
          </button>
          <button type="button" class="mirror-btn" id="btn-shape-line" data-shape="line" title="linha" aria-pressed="false">
            <svg class="mirror-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="4" y1="19" x2="20" y2="5" stroke="currentColor" stroke-width="3"/>
            </svg>
          </button>
        </div>
        <div class="canvas-frame" id="canvas-frame">
          <canvas id="main-canvas" aria-label="Área de desenho"></canvas>
          <canvas id="overlay-canvas" aria-hidden="true"></canvas>
          <div id="canvas-cursor" class="canvas-cursor" hidden aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <aside class="tool-rail">
      <nav class="tool-rail__stack" id="tool-list"></nav>
      <button type="button" class="obliterate" id="btn-clear" title="obliterar tudo"></button>
    </aside>

    <footer class="dock">
      <button type="button" class="paper-btn" id="btn-save">Salvar</button>
      <button type="button" class="paper-btn" id="btn-export-gif">Exportar</button>
      <button type="button" class="paper-btn" id="btn-background">Background</button>
      <button type="button" class="paper-btn" id="btn-crop">Crop</button>
      <button type="button" class="paper-btn paper-btn--icon" id="btn-undo" title="desfazer (Ctrl+Z)">↶</button>
      <button type="button" class="paper-btn paper-btn--icon" id="btn-redo" title="refazer (Ctrl+Y)">↷</button>
    </footer>
  </div>

  <!-- ── Modal: cor + opacidade da ferramenta ───────────── -->
  <div class="modal-backdrop" id="color-modal" hidden>
    <div class="win color-win">
      <div class="win__bar">
        <span id="color-win-title">escolher cor</span>
        <button type="button" class="win__close" id="color-close" aria-label="Fechar">×</button>
      </div>
      <div class="color-win__body">
        <div class="color-grid" id="color-grid"></div>
        <div class="color-win__ctrls">
          <div class="ctrl-row ctrl-row--op">
            <span class="ctrl-row__label">opacidade</span>
            <div class="stepper">
              <button type="button" class="stepper__btn" id="modal-op-down" aria-label="Menos">&#9664;</button>
              <span class="stepper__stage"><span class="stepper__val" id="modal-op-val">100%</span></span>
              <button type="button" class="stepper__btn" id="modal-op-up" aria-label="Mais">&#9654;</button>
            </div>
          </div>
          <div class="ctrl-row ctrl-row--size">
            <span class="ctrl-row__label">tamanho</span>
            <div class="stepper">
              <button type="button" class="stepper__btn" id="modal-size-down" aria-label="Diminuir">&#9664;</button>
              <span class="stepper__stage"><span class="stepper__dot" id="modal-size-dot"></span></span>
              <button type="button" class="stepper__btn" id="modal-size-up" aria-label="Aumentar">&#9654;</button>
            </div>
          </div>
        </div>
        <div class="color-win__foot">
          <span class="color-win__chip" id="color-current"></span>
          <input type="text" class="color-win__hex" id="color-hex" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: cor do fundo ────────────────────────────── -->
  <div class="modal-backdrop" id="bg-modal" hidden>
    <div class="win color-win">
      <div class="win__bar">
        <span>cor do fundo</span>
        <button type="button" class="win__close" id="bg-close" aria-label="Fechar">×</button>
      </div>
      <div class="color-win__body">
        <div class="color-grid" id="bg-grid"></div>
        <div class="color-win__foot">
          <span class="color-win__chip" id="bg-current"></span>
          <input type="text" class="color-win__hex" id="bg-hex" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: tamanho da tela (Crop) ──────────────────── -->
  <div class="modal-backdrop" id="res-modal" hidden>
    <div class="win res-win">
      <div class="win__bar">
        <span>tamanho da tela</span>
        <button type="button" class="win__close" id="res-close" aria-label="Fechar">×</button>
      </div>
      <div class="res-win__body" id="res-list"></div>
    </div>
  </div>

  <!-- ── Modal: ações do projeto (renomear / excluir) ───── -->
  <div class="modal-backdrop" id="proj-modal" hidden>
    <div class="win proj-win">
      <div class="win__bar">
        <span id="proj-win-title">projeto</span>
        <button type="button" class="win__close" id="proj-close" aria-label="Fechar">×</button>
      </div>
      <div class="proj-win__body">
        <button type="button" class="proj-action" id="proj-rename">Renomear</button>
        <button type="button" class="proj-action proj-action--danger" id="proj-delete">Excluir</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: renomear projeto ────────────────────────── -->
  <div class="modal-backdrop" id="rename-modal" hidden>
    <div class="win rename-win">
      <div class="win__bar">
        <span>renomear projeto</span>
        <button type="button" class="win__close" id="rename-close" aria-label="Fechar">×</button>
      </div>
      <div class="rename-win__body">
        <input type="text" class="rename-win__input" id="rename-input" maxlength="40" spellcheck="false">
        <div class="rename-win__foot">
          <button type="button" class="ui-btn" id="rename-cancel">Cancelar</button>
          <button type="button" class="ui-btn ui-btn--go" id="rename-confirm">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: apagar projeto ──────────────────────────── -->
  <div class="modal-backdrop" id="del-modal" hidden>
    <div class="win del-win">
      <div class="win__bar">
        <span>apagar projeto</span>
        <button type="button" class="win__close" id="del-close" aria-label="Fechar">×</button>
      </div>
      <div class="del-win__body">
        <p class="del-win__msg">Apagar &ldquo;<span id="del-name"></span>&rdquo;?<br><span class="del-win__sub">Isto não pode ser desfeito.</span></p>
        <div class="del-win__foot">
          <button type="button" class="ui-btn" id="del-cancel">Cancelar</button>
          <button type="button" class="ui-btn ui-btn--danger" id="del-confirm">Apagar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: opções da camada ────────────────────────── -->
  <div class="modal-backdrop" id="layer-menu-modal" hidden>
    <div class="win layer-menu-win">
      <div class="win__bar">
        <span id="layer-menu-title">camada</span>
        <button type="button" class="win__close" id="layer-menu-close" aria-label="Fechar">×</button>
      </div>
      <div class="layer-menu-win__body">
        <div class="ctrl-row" id="layer-menu-opacity">
          <span class="ctrl-row__label">opacidade</span>
          <div class="stepper">
            <button type="button" class="stepper__btn" id="layer-op-down" aria-label="Menos">&#9664;</button>
            <span class="stepper__stage"><span class="stepper__val" id="layer-op-val">100%</span></span>
            <button type="button" class="stepper__btn" id="layer-op-up" aria-label="Mais">&#9654;</button>
          </div>
        </div>
        <button type="button" class="proj-action" id="layer-menu-rename">Renomear</button>
        <button type="button" class="proj-action" id="layer-menu-dup">Duplicar</button>
        <button type="button" class="proj-action" id="layer-menu-lock">Bloquear</button>
        <button type="button" class="proj-action proj-action--danger" id="layer-menu-del">Apagar camada</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: renomear camada ─────────────────────────── -->
  <div class="modal-backdrop" id="layer-rename-modal" hidden>
    <div class="win rename-win">
      <div class="win__bar">
        <span>renomear camada</span>
        <button type="button" class="win__close" id="layer-rename-close" aria-label="Fechar">×</button>
      </div>
      <div class="rename-win__body">
        <input type="text" class="rename-win__input" id="layer-rename-input" maxlength="24" spellcheck="false">
        <div class="rename-win__foot">
          <button type="button" class="ui-btn" id="layer-rename-cancel">Cancelar</button>
          <button type="button" class="ui-btn ui-btn--go" id="layer-rename-confirm">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Transição íris pixelada (canvas de baixa resolução ampliado) -->
  <canvas id="wipe" class="wipe" hidden></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>
